<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helaena's Dashboard</title>
    <style>
        :root {
            --bg: #f2cecd;
            --text: #ce8f9e;
            --sub: #818455;
            --accent: #f9f6f4;
            --card-bg: #eacfd9;
        }

        body {
            background-color: var(--bg);
            font-family: sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .dash-container {
            width: 100%;
            max-width: 900px;
        }

        .dash-back-btn {
            display: inline-block;
            padding: 8px 16px;
            border: 1px solid #818455;
            border-radius: 20px;
            text-decoration: none;
            color: #818455;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
            background: none;
        }

        .dash-greeting-area h1 {
            font-size: 26px;
            margin: 0;
            color: var(--text);
        }

        .dash-greeting-area p {
            font-size: 13px;
            color: var(--sub);
            margin: 5px 0 25px;
        }

        .dash-section-label {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent);
            border-bottom: 1px solid #ddd;
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .dash-card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .dash-card:hover { 
            transform: translateY(-3px); 
        }

        .dash-card-pattern { 
            height: 90px; 
            background: #eee; 
        }
        
        .dash-card-pattern img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .dash-card-content { 
            padding: 10px; 
        }
        
        .dash-card-content b { 
            font-size: 13px; 
            color: var(--text); 
            display: block; 
        }
        
        .dash-card-content span { 
            font-size: 10px; 
            color: var(--sub); 
        }

        #viewArea { 
            display: none; 
        }
        
        .submission-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .sub-card {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 15px;
            text-align: center;
        }

        .sub-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            background: white;
            cursor: pointer;
        }

        .sub-card b { 
            display: block; 
            margin-top: 8px; 
            font-size: 12px; 
            color: var(--text); 
        }

        #lightbox {
            display: none;
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        #lightbox img { 
            max-width: 90%; 
            max-height: 80%; 
            border-radius: 10px; 
        }
    </style>
</head>
<body>

    <div class="dash-container">
        <button id="backBtn" class="dash-back-btn" onclick="showDashboard()">← BACK TO HOME</button>

        <div class="dash-greeting-area">
            <h1 id="greet">Good Evening, Helaena</h1>
            <p id="subGreeting">Categorize and secure your files.</p>
        </div>

        <div id="sectionLabel" class="dash-section-label">Dashboard</div>

        <div id="mainDashboard" class="dash-grid">
            <div class="dash-card" onclick="showCategory('quiz')">
                <div class="dash-card-pattern"><img src="helae/runaway.gif"></div>
                <div class="dash-card-content"><b>Quizzes</b><span>View Tests</span></div>
            </div>
            <div class="dash-card" onclick="showCategory('lab')">
                <div class="dash-card-pattern"><img src="helae/bubbles.gif"></div>
                <div class="dash-card-content"><b>Laboratory</b><span>View Reports</span></div>
            </div>
            <div class="dash-card" onclick="showCategory('exam')">
                <div class="dash-card-pattern"><img src="helae/blossom.gif"></div>
                <div class="dash-card-content"><b>Major Exams</b><span>View Finals</span></div>
            </div>
        </div>

        <div id="viewArea">
            <div id="submissionGrid" class="submission-grid"></div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="fullImg"></div>

    <script>
        const hardCodedData = [
            { title: "Quiz 1", proof: "quizzes/quiz1.jpeg" },
            { title: "Quiz 2 - HTML", proof: "quizzes/quiz2.jpeg" },
            { title: "Quiz 3 - CSS", proof: ["quizzes/quiz3_1.jpeg", "quizzes/quiz3_2.jpeg"] },
            { title: "LABORATORY WORK - CAROUSELL", proof: "lab1.jpeg" }
        ];

        function renderItems(type) {
            const grid = document.getElementById('submissionGrid');
            grid.innerHTML = "";
            const localData = JSON.parse(localStorage.getItem('academicData')) || [];
            const allItems = [...hardCodedData, ...localData];

            allItems.forEach(item => {
                if (item.title.toLowerCase().includes(type)) {
                    const img = Array.isArray(item.proof) ? item.proof[0] : item.proof;
                    grid.innerHTML += `
                        <div class="sub-card">
                            <img src="${img}" onclick="openImg('${img}')">
                            <b>${item.title}</b>
                        </div>
                    `;
                }
            });
        }

        function showCategory(type) {
            const dashboard = document.getElementById('mainDashboard');
            const viewArea = document.getElementById('viewArea');
            const label = document.getElementById('sectionLabel');
            const backBtn = document.getElementById('backBtn');

            dashboard.style.display = 'none';
            viewArea.style.display = 'block';
            label.textContent = type.toUpperCase() + "S";
            backBtn.textContent = "← BACK TO DASHBOARD";
            
            renderItems(type);
        }

        function showDashboard() {
            const dashboard = document.getElementById('mainDashboard');
            const viewArea = document.getElementById('viewArea');
            const backBtn = document.getElementById('backBtn');

            if (viewArea.style.display === 'block') {
                dashboard.style.display = 'grid';
                viewArea.style.display = 'none';
                document.getElementById('sectionLabel').textContent = "Dashboard";
                backBtn.textContent = "← BACK TO HOME";
            } else {
                window.location.href = "index.html";
            }
        }

        function openImg(src) {
            document.getElementById('fullImg').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            let welcome = hour < 12 ? "Good Morning" : hour < 18 ? "Good Afternoon" : "Good Evening";
            document.getElementById('greet').textContent = `${welcome}, Helaena!`;
        }

        updateGreeting();
    </script>
</body>
</html>
