<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Submissions</title>
    <style>
        :root {
            --bg: #f2cecd;
            --text: #ce8f9e;
            --sub: #818455;
            --accent: #f9f6f4;
            --card-bg: #eacfd9;
        }

        body {
            background-color: var(--accent);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text);
        }

        .submissions-container {
            max-width: 900px;
            margin: auto;
        }

        .submissions-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .submissions-nav-btn {
            text-decoration: none;
            color: var(--sub);
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            border: 1.5px solid var(--sub);
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .submissions-nav-btn:hover {
            background-color: var(--sub);
            color: var(--accent);
        }

        .submissions-main-title {
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
        }

        .submissions-shelf {
            margin-bottom: 50px;
        }

        .submissions-shelf-title {
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 5px;
            margin-bottom: 20px;
            color: var(--sub);
            text-transform: uppercase;
        }

        .submissions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .submissions-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submissions-card:hover {
            transform: translateY(-5px);
        }

        .submissions-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 12px;
            background: white;
        }

        .submissions-card b {
            display: block;
            margin-top: 12px;
            font-size: 14px;
            color: var(--text);
        }

        .submissions-card span {
            font-size: 11px;
            color: var(--sub);
            display: block;
            margin-top: 5px;
        }

        .submissions-lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .submissions-lightbox img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 10px;
        }

        .submissions-lightbox-close {
            margin-top: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="submissions-container">
        <div class="submissions-nav">
            <a href="dashboard.html" class="submissions-nav-btn">← Back to Dashboard</a>
            <a href="index.html" class="submissions-nav-btn">Back to Home</a>
        </div>

        <h1 class="submissions-main-title">Submissions</h1>

        <div class="submissions-shelf">
            <div class="submissions-shelf-title">Quizzes</div>
            <div id="quiz-space" class="submissions-grid"></div>
        </div>

        <div class="submissions-shelf">
            <div class="submissions-shelf-title">Laboratory</div>
            <div id="lab-space" class="submissions-grid"></div>
        </div>

        <div class="submissions-shelf">
            <div class="submissions-shelf-title">Major Exams</div>
            <div id="exam-space" class="submissions-grid"></div>
        </div>
    </div>

    <div id="lightbox" class="submissions-lightbox" onclick="closeFullView()">
        <img id="fullImage" src="" alt="Full View">
        <div class="submissions-lightbox-close">Click anywhere to close preview</div>
    </div>

    <script>
        const hardCodedData = [
            { title: "Quiz 1", proof: "quizzes/quiz1.jpeg"},
            { title: "Quiz 2 - HTML" , proof: "quizzes/quiz2.jpeg"},
            { title: "Quiz 3 - CSS" , proof: ["quizzes/quiz3_1.jpeg", "quizzes/quiz3_2.jpeg"] },
            { title: "LABORATORY WORK - CAROUSELL" , proof: "laboratories/lab1.jpeg" },
            
        ];

        const allItems = [...hardCodedData, ...(JSON.parse(localStorage.getItem('academicData')) || [])];
        const quizSpace = document.getElementById('quiz-space');
        const labSpace = document.getElementById('lab-space');
        const examSpace = document.getElementById('exam-space');

        allItems.forEach(item => {
            const fileLine = item.file ? `<span>📁 ${item.file}</span>` : '';
            
            const cardHTML = `
                <div class="submissions-card" onclick="openFullView('${item.proof}')">
                    <img src="${item.proof}" alt="Proof">
                    <b>${item.title}</b>
                    ${fileLine}
                </div>
            `;

            const title = item.title.toLowerCase();
            if (title.includes('quiz')) quizSpace.innerHTML += cardHTML;
            else if (title.includes('lab')) labSpace.innerHTML += cardHTML;
            else if (title.includes('exam')) examSpace.innerHTML += cardHTML;
        });

        function openFullView(src) {
            document.getElementById('fullImage').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeFullView() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>

</body>
</html>
